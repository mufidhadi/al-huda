version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: tqh-backend
    ports:
      - "8000:8000"
    volumes:
      - hf_cache:/root/.cache/huggingface
    environment:
      - PYTHONUNBUFFERED=1
      - DB_HOST=DB_HOST_PLACEHOLDER
      - DB_NAME=tanya_quran_hadist
      - DB_USER=DB_USER_PLACEHOLDER
      - DB_PASS=DB_PASS_PLACEHOLDER
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: tqh-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: always

volumes:
  hf_cache:
